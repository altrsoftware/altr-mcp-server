name: Publish to PyPI

on:
  push:
    # Numeric segments only — `v0.2.1-rc1` and other pre-releases will NOT match.
    # If you want a pre-release tag to trigger a TestPyPI flow, add a separate job.
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Verify tests pass before publishing
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run pytest tests/ -x

  publish:
    name: Build and publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-mcp:
    name: Publish to MCP Registry
    needs: publish            # only after the PyPI upload succeeds
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write         # GitHub OIDC — proves the io.github.altrsoftware namespace
      contents: read
    steps:
      - uses: actions/checkout@v5

      # The registry re-validates the PyPI package (and its mcp-name token) at
      # publish time, so wait until the tagged version is actually queryable.
      - name: Wait for the release on PyPI
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "Waiting for altr-mcp==$version to appear on PyPI..."
          for i in $(seq 1 30); do
            if curl -fsS "https://pypi.org/pypi/altr-mcp/$version/json" >/dev/null 2>&1; then
              echo "Found altr-mcp==$version on PyPI."
              exit 0
            fi
            echo "  not yet (attempt $i); retrying in 10s"
            sleep 10
          done
          echo "::error::altr-mcp==$version did not appear on PyPI in time"
          exit 1

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json to the MCP Registry
        run: ./mcp-publisher publish
